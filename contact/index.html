<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <h1>Contact</h1>
</head>
<body>
    <form action="mailto:mpaoletta@ucsd.edu" method="POST" enctype="text/plain">
        <label for="email">
            Email:
            <input type="email" name="email"></input>
        </label>
        <label for="subject">
            Subject:
            <input name="subject"></input>
        </label>
        <label for="body">
            Message:
            <textarea name="body"></textarea>
        </label>
        <button>Send</button>
    </form>
</body>
</html>
