<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">WebReg2Cal project preview</title>
  <desc id="desc">Green project card preview for WebReg2Cal.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#19b86a"/>
      <stop offset="100%" stop-color="#0e9d66"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="#f5f5f5"/>
  <rect width="1200" height="230" fill="url(#bg)"/>
  <rect x="950" y="28" rx="28" ry="28" width="160" height="160" fill="rgba(255,255,255,0.18)"/>
  <text x="70" y="78" font-size="78" font-weight="700" fill="#ffffff" font-family="Arial, Helvetica, sans-serif">WebReg2Cal</text>
  <text x="70" y="140" font-size="34" font-weight="600" fill="#dff6e8" font-family="Arial, Helvetica, sans-serif">Course Schedule Parser Chrome Extension</text>
  <text x="84" y="380" font-size="30" font-weight="700" fill="#28a84d" font-family="Arial, Helvetica, sans-serif">PERSONAL PROJECT</text>
  <text x="84" y="470" font-size="34" fill="#5b6574" font-family="Arial, Helvetica, sans-serif">Converts UCSD WebReg schedules into .ics files</text>
  <text x="84" y="520" font-size="34" fill="#5b6574" font-family="Arial, Helvetica, sans-serif">for easy calendar imports and organization.</text>
  <text x="84" y="620" font-size="30" fill="#28a84d" font-family="Arial, Helvetica, sans-serif">✓</text>
  <text x="130" y="620" font-size="28" fill="#616b79" font-family="Arial, Helvetica, sans-serif">150+ active UCSD users</text>
  <text x="84" y="675" font-size="30" fill="#28a84d" font-family="Arial, Helvetica, sans-serif">✓</text>
  <text x="130" y="675" font-size="28" fill="#616b79" font-family="Arial, Helvetica, sans-serif">Google Calendar API integration</text>
</svg>